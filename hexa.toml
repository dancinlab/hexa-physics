# hexa.toml — hexa-physics standalone package manifest
#
# 🔬 HEXA-PHYSICS — n=6 electromagnetism, fluid dynamics, gravity-waves, thermodynamics, optics, crystallography substrate
# Provenance: extracted from canon@ded52144 on 2026-05-10
#             (9-leaf migration from canon).

[package]
name = "hexa-physics"
version = "0.1.0"
entry = "cli/hexa-physics.hexa"
description = "🔬 HEXA-PHYSICS — n=6 electromagnetism, fluid dynamics, gravity-waves, thermodynamics, optics, crystallography substrate (9-verb library). Each verb derives parameters from σ(6)=12, τ(6)=4, φ(6)=2 number theory. SPEC_CATALOG_ONLY at v0.1.0."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-physics"
homepage = "https://github.com/dancinlab/hexa-physics"
readme = "README.md"
keywords = ["hexa-family", "n6-lattice", "physics", "electromagnetism", "fluid", "thermodynamics", "optics", "crystallography", "gravity-wave", "spec-catalog"]
categories = ["spec-catalog", "hexa-family"]

[[bin]]
name = "hexa-physics"
path = "cli/hexa-physics.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

[scripts]
install = "install.hexa"

# ── Verb manifest (verb_parent = "." → each verb is a top-level folder) ──
verb_parent = "."

[verbs]
computational-fluid-dynamics = ["computational-fluid-dynamics"]
crystallography = ["crystallography"]
crystallography-materials = ["crystallography-materials"]
electromagnetism = ["electromagnetism"]
fluid = ["fluid"]
gravity-wave = ["gravity-wave"]
light-optics = ["light-optics"]
optics = ["optics"]
thermodynamics = ["thermodynamics"]

# ── Modules manifest (primary md per verb) ────────────────
[modules]
specs = [
    "computational-fluid-dynamics/computational-fluid-dynamics.md",
    "crystallography/crystallography.md",
    "crystallography-materials/crystallography-materials.md",
    "electromagnetism/electromagnetism.md",
    "fluid/fluid.md",
    "gravity-wave/gravity-wave.md",
    "light-optics/light-optics.md",
    "optics/optics.md",
    "thermodynamics/thermodynamics.md",
]

[dependencies]
hexa-lang = ">=1.0.0"
python    = ">=3.10"   # stdlib only

# ── n=6 master identity ───────────────────────────────────
[invariants.n6]
sigma_6           = 12
tau_6             = 4
phi_6             = 2
J_2               = 24
master_identity   = "σ(6) · φ(6) = n · τ(6) = J₂ = 24"
verb_count        = 9

# ── Closure provenance ────────────────────────────────────
[closure]
verbs_total       = 9
verbs_wired       = 0
verbs_spec        = 9
verifiers_pass    = "2/2 (n6_arithmetic + spec_inventory)"
pytest_pass       = "10/10 (-m auto)"
verdict           = "SPEC_CATALOG_ONLY"
extracted_from    = "canon@ded52144 on 2026-05-10"
closure_wave      = "Wave N (2026-05-13) — verify/ + tests/ + build/ wired"

# ── Scope honesty ─────────────────────────────────────────
[scope]
honest_scope = "🔬 9-verb electromagnetism, fluid dynamics, gravity-waves, thermodynamics, optics, crystallography substrate library. Reading the closed-form spec is grounded; running it requires the unsolved engineering or domain implementation."

[cost]
mac_local_default = "$0 (markdown spec library + .hexa CLI)"
all_verbs         = "$0 (read-only)"
